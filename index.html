<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Little Surprise ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:#08111f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;

}

.card{

background:#111d31;
padding:50px;
border-radius:25px;
width:400px;
max-width:90%;
text-align:center;
color:white;
box-shadow:0 20px 50px rgba(0,0,0,.4);

}

h1{

font-size:40px;
margin-bottom:15px;

}

p{

color:#c9d1d9;
line-height:1.7;
margin-bottom:25px;

}

button{

padding:14px 35px;
border:none;
border-radius:50px;
background:#ff7aa2;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;

}

button:hover{

transform:scale(1.05);

}

#passwordBox{

display:none;
margin-top:30px;

}

input{

width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-bottom:15px;
font-size:16px;
text-align:center;

}

#error{

color:#ff8b8b;
margin-top:10px;

}

</style>

</head>

<body>

<div class="card">

<h1>🎂</h1>

<h2>Happy Birthday</h2>

<p>

I made something just for you.<br><br>

Before you open it...<br>

there's one little thing you need to do ❤️

</p>

<button onclick="showPassword()">

Continue

</button>

<div id="passwordBox">

<input
type="password"
id="password"
placeholder="Enter your birthday">

<button onclick="checkPassword()">

Unlock My Gift 🎁

</button>

<p id="error"></p>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>
function showPassword() {
    document.getElementById("passwordBox").style.display = "block";
}

function checkPassword() {
    const pass = document.getElementById("password").value;

    if (pass === "21072001") {

        confetti({
            particleCount: 180,
            spread: 120,
            origin: { y: 0.6 }
        });

        setTimeout(() => {
            window.location.href = "gift.html";
        }, 1800);

    } else {
        document.getElementById("error").innerHTML = "Wrong password ❤️";
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="only light">
<meta name="theme-color" content="#08111f">

<title>A Little Surprise ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:#08111f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;

}

.card{

background:#111d31;
padding:50px;
border-radius:25px;
width:400px;
max-width:90%;
text-align:center;
color:white;
box-shadow:0 20px 50px rgba(0,0,0,.4);

}

h1{

font-size:40px;
margin-bottom:15px;

}

p{

color:#c9d1d9;
line-height:1.7;
margin-bottom:25px;

}

button{

padding:14px 35px;
border:none;
border-radius:50px;
background:#ff7aa2;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;

}

button:hover{

transform:scale(1.05);

}

#passwordBox{

display:none;
margin-top:30px;

}

input{

width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-bottom:15px;
font-size:16px;
text-align:center;

}

#error{

color:#ff8b8b;
margin-top:10px;

}

/* SAFARI DARK MODE FIX */

html{
    color-scheme: light only;
    background:#08111f;
}

body{
    background:#08111f !important;
    color:#ffffff !important;
    -webkit-text-size-adjust:100%;
}

.card{
    background:#111d31 !important;
    color:#ffffff !important;
}

.card h1,
.card h2{
    color:#ffffff !important;
    -webkit-text-fill-color:#ffffff !important;
}

.card p{
    color:#c9d1d9 !important;
    -webkit-text-fill-color:#c9d1d9 !important;
}

#loadingScreen{
    background:#08111f !important;
}

.loading-content{
    color:#ffffff !important;
}

.loading-content h1,
.loading-content h2{
    color:#ffffff !important;
    -webkit-text-fill-color:#ffffff !important;
}

.loading-content p{
    color:#d8d8d8 !important;
    -webkit-text-fill-color:#d8d8d8 !important;
}

input{
    background:#ffffff !important;
    color:#08111f !important;
    -webkit-text-fill-color:#08111f !important;
    color-scheme:light;
}

input::placeholder{
    color:#777777 !important;
    -webkit-text-fill-color:#777777 !important;
    opacity:1;
}

button{
    background:#ff7aa2 !important;
    color:#ffffff !important;
    -webkit-text-fill-color:#ffffff !important;
    -webkit-appearance:none;
    appearance:none;
}

/* =========================
   IPHONE SAFARI WELCOME FIX
========================= */

#welcome h1,
#welcomeTitle,
.welcome h1,
.welcome-title,
.welcome-content h1 {
    color: #ffffff !important;
    -webkit-text-fill-color: #ffffff !important;
    opacity: 1 !important;
    background: none !important;
    background-image: none !important;
    -webkit-background-clip: initial !important;
    background-clip: initial !important;
    text-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
}

@media (prefers-color-scheme: dark) {

    #welcome h1,
    #welcomeTitle,
    .welcome h1,
    .welcome-title,
    .welcome-content h1 {
        color: #ffffff !important;
        -webkit-text-fill-color: #ffffff !important;
        background: transparent !important;
        background-image: none !important;
        opacity: 1 !important;
    }

}

</style>

</head>

<body>

    <div id="loadingScreen">

    <div class="loading-content">

        <h1>❤️</h1>

        <h2>Welcome, My Favorite Human</h2>

        <p>I made this little gift with all my love.</p>

    </div>

</div>

<div class="card">

<h1>🎂</h1>

<h2>Happy Birthday</h2>

<p>

I made something just for you.<br><br>

Before you open it...<br>

there's one little thing you need to do ❤️

</p>

<button onclick="showPassword()">

Continue

</button>

<div id="passwordBox">

<input
type="password"
id="password"
placeholder="Enter your birthday">

<button onclick="checkPassword()">

Unlock My Gift 🎁

</button>

<p id="error"></p>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>
function showPassword() {
    document.getElementById("passwordBox").style.display = "block";
}

function checkPassword() {
    const pass = document.getElementById("password").value;

    if (pass === "21072001") {

        confetti({
    particleCount:180,
    spread:120,
    origin:{y:0.6}
});

document.getElementById("loadingScreen").classList.add("show");

setTimeout(function(){

    window.location.href="gift.html";

},3000);

    }
}
</script>

</body>
</html>

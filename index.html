<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >

    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#081423">

    <title>🎂 Happy Birthday, My Favorite Human</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            background: #081423;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;

            background: #081423 !important;
            color: #ffffff !important;

            font-family: Arial, Helvetica, sans-serif;

            overflow: hidden;

            -webkit-text-size-adjust: 100%;
        }

        button,
        input {
            font: inherit;
        }

        button {
            -webkit-appearance: none;
            appearance: none;
        }

        /* =========================
           SCENE
        ========================= */

        .scene {
            position: fixed;
            inset: 0;

            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;

            display: flex;
            align-items: center;
            justify-content: center;

            padding:
                calc(30px + env(safe-area-inset-top))
                25px
                calc(30px + env(safe-area-inset-bottom));

            background: #081423 !important;

            transition:
                opacity 0.7s ease,
                transform 0.7s ease,
                visibility 0.7s;
        }

        .scene-content {
            width: 100%;
            max-width: 430px;

            text-align: center;
        }

        /* =========================
           SCENE 1
        ========================= */

        #sceneOne {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
            z-index: 2;
        }

        #sceneOne.hide {
            opacity: 0;
            visibility: hidden;
            transform: translateY(-30px);
            pointer-events: none;
        }

        .cake {
            display: block;

            margin-bottom: 28px;

            font-size: 70px;
            line-height: 1;
        }

        .birthday-title {
            color: #ffffff !important;

            font-size: clamp(42px, 12vw, 68px);
            line-height: 0.95;
            font-weight: 800;

            letter-spacing: -2px;

            margin-bottom: 28px;
        }

        .birthday-subtitle {
            color: #ffffff !important;

            font-size: clamp(20px, 5.5vw, 27px);
            line-height: 1.5;

            opacity: 0.9;

            margin-bottom: 52px;
        }

        .before-text {
            color: #ffffff !important;

            font-size: clamp(19px, 5vw, 25px);
            line-height: 1.55;

            opacity: 0.88;

            margin-bottom: 42px;
        }

        /* =========================
           BUTTON
        ========================= */

        .main-button {
            width: min(100%, 270px);
            min-height: 64px;

            border: none;
            border-radius: 999px;

            padding: 16px 30px;

            background: #ff73a1 !important;
            color: #ffffff !important;

            font-size: 22px;
            font-weight: 700;

            cursor: pointer;

            box-shadow:
                0 12px 30px rgba(255, 115, 161, 0.25);

            transition:
                transform 0.2s ease,
                box-shadow 0.2s ease;
        }

        .main-button:active {
            transform: scale(0.96);
        }

        /* =========================
           SCENE 2
        ========================= */

        #sceneTwo {
            opacity: 0;
            visibility: hidden;
            transform: translateY(30px);
            pointer-events: none;
            z-index: 1;
        }

        #sceneTwo.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
            pointer-events: auto;
            z-index: 3;
        }

        .heart {
            display: block;

            margin-bottom: 28px;

            font-size: 68px;
            line-height: 1;

            animation: heartbeat 1.4s infinite;
        }

        @keyframes heartbeat {
            0%,
            100% {
                transform: scale(1);
            }

            15% {
                transform: scale(1.12);
            }

            30% {
                transform: scale(1);
            }

            45% {
                transform: scale(1.08);
            }

            60% {
                transform: scale(1);
            }
        }

        .welcome-title {
            color: #ffffff !important;

            font-size: clamp(38px, 10vw, 58px);
            line-height: 1.05;
            font-weight: 800;

            letter-spacing: -1.5px;

            margin-bottom: 28px;
        }

        .welcome-text {
            color: #ffffff !important;

            font-size: clamp(20px, 5.5vw, 26px);
            line-height: 1.55;

            opacity: 0.9;

            margin-bottom: 48px;
        }

        /* =========================
           PASSWORD
        ========================= */

        .password-wrapper {
            width: 100%;
            max-width: 330px;

            margin: 0 auto;
        }

        #password {
            display: block;

            width: 100%;
            height: 66px;

            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 22px;

            padding: 0 22px;

            background: #ffffff !important;
            color: #081423 !important;

            font-size: 19px;
            text-align: center;

            outline: none;

            margin-bottom: 20px;
        }

        #password::placeholder {
            color: #777777 !important;
            opacity: 1;
        }

        #password:focus {
            border-color: #ff73a1;

            box-shadow:
                0 0 0 5px rgba(255, 115, 161, 0.15);
        }

        .unlock-button {
            width: 100%;
            min-height: 68px;

            border: none;
            border-radius: 999px;

            padding: 15px 25px;

            background: #ff73a1 !important;
            color: #ffffff !important;

            font-size: 21px;
            line-height: 1.3;
            font-weight: 700;

            cursor: pointer;

            box-shadow:
                0 12px 30px rgba(255, 115, 161, 0.25);

            transition: transform 0.2s ease;
        }

        .unlock-button:active {
            transform: scale(0.96);
        }

        #error {
            min-height: 25px;

            margin-top: 18px;

            color: #ff9cbd !important;

            font-size: 17px;
            font-weight: 600;
        }

        /* =========================
           SHAKE
        ========================= */

        .shake {
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-8px);
            }

            50% {
                transform: translateX(8px);
            }

            75% {
                transform: translateX(-5px);
            }
        }

        /* =========================
           SMALL IPHONE
        ========================= */

        @media (max-height: 700px) {

            .cake,
            .heart {
                font-size: 50px;
                margin-bottom: 18px;
            }

            .birthday-title,
            .welcome-title {
                margin-bottom: 18px;
            }

            .birthday-subtitle {
                margin-bottom: 28px;
            }

            .before-text {
                margin-bottom: 28px;
            }

            .welcome-text {
                margin-bottom: 30px;
            }

            .scene {
                padding-top:
                    calc(20px + env(safe-area-inset-top));

                padding-bottom:
                    calc(20px + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>


<body>

    <!-- =========================
         SCENE ONE
    ========================== -->

    <section class="scene" id="sceneOne">

        <div class="scene-content">

            <span class="cake">🎂</span>

            <h1 class="birthday-title">
                Happy<br>
                Birthday
            </h1>

            <p class="birthday-subtitle">
                I made something<br>
                just for you.
            </p>

            <p class="before-text">
                Before you open it...<br>
                there's one little thing<br>
                you need to do ❤️
            </p>

            <button
                class="main-button"
                type="button"
                onclick="showPassword()"
            >
                Continue
            </button>

        </div>

    </section>


    <!-- =========================
         SCENE TWO
    ========================== -->

    <section class="scene" id="sceneTwo">

        <div class="scene-content">

            <span class="heart">❤️</span>

            <h1 class="welcome-title">
                Welcome,<br>
                My Favorite Human.
            </h1>

            <p class="welcome-text">
                I made this little gift<br>
                with all my love.
            </p>


            <div class="password-wrapper" id="passwordWrapper">

                <input
                    type="text"
                    id="password"
                    inputmode="numeric"
                    autocomplete="off"
                    placeholder="Enter your birthday"
                    maxlength="8"
                >


                <button
                    class="unlock-button"
                    type="button"
                    onclick="checkPassword()"
                >
                    Unlock My Gift 🎁
                </button>


                <p id="error"></p>

            </div>

        </div>

    </section>


    <!-- CONFETTI -->

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>


    <script>

        function showPassword() {

            const sceneOne =
                document.getElementById("sceneOne");

            const sceneTwo =
                document.getElementById("sceneTwo");


            sceneOne.classList.add("hide");


            setTimeout(() => {

                sceneTwo.classList.add("show");

            }, 350);

        }


        function checkPassword() {

            const password =
                document.getElementById("password");

            const error =
                document.getElementById("error");

            const wrapper =
                document.getElementById("passwordWrapper");


            const pass =
                password.value.trim();


            if (pass === "21072001") {

                error.innerHTML = "";


                confetti({

                    particleCount: 180,

                    spread: 120,

                    origin: {
                        y: 0.6
                    }

                });


                setTimeout(() => {

                    window.location.href = "gift.html";

                }, 1800);


            } else {

                error.innerHTML =
                    "Wrong birthday, my love 💗";


                wrapper.classList.remove("shake");


                void wrapper.offsetWidth;


                wrapper.classList.add("shake");

            }

        }


        document
            .getElementById("password")
            .addEventListener("keydown", function(event) {

                if (event.key === "Enter") {

                    checkPassword();

                }

            });

    </script>

</body>

</html>
